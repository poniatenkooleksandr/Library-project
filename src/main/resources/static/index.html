<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Бібліотека Spring Data JPA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }

        header {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            padding: 35px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
        }

        header p {
            margin-top: 10px;
            font-size: 18px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 180px;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        .books {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .book {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            transition: 0.2s;
        }

        .book:hover {
            transform: translateY(-4px);
        }

        .book h3 {
            margin-top: 0;
            color: #1e40af;
        }

        .tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .empty {
            text-align: center;
            font-size: 18px;
            padding: 30px;
            color: #64748b;
        }

        .delete-btn {
    background: #dc2626;
    margin-top: 10px;
}

.delete-btn:hover {
    background: #991b1b;
}

.edit-btn {
    background: #16a34a;
    margin-top: 10px;
    margin-right: 8px;
}

.edit-btn:hover {
    background: #166534;
}
    </style>
</head>
<body>

<header>
    <h1>Бібліотека Spring Data JPA</h1>
    <p>Демонстрація роботи Spring з персистентними даними</p>
</header>

<div class="container">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введіть назву книги або автора">
        <button onclick="searchBooks()">Пошук</button>
        <button onclick="loadBooks()">Показати всі</button>
    </div>

    <h2>Додати автора</h2>

    <div class="search-box">
        <input type="text" id="authorName" placeholder="Ім'я автора">
        <input type="text" id="authorCountry" placeholder="Країна">
        <button onclick="addAuthor()">Додати автора</button>
    </div>

    <h2>Додати книгу</h2>

    <div class="search-box">
        <input type="text" id="bookTitle" placeholder="Назва книги">
        <input type="number" id="bookYear" placeholder="Рік">
        <input type="text" id="bookAuthorIds" placeholder="ID авторів, наприклад 1 або 1,2,3">
        <button onclick="addBook()">Додати книгу</button>
    </div>

    <div id="result" class="books"></div>

</div>

<script>
    async function loadBooks() {
        const response = await fetch('/books');
        const books = await response.json();
        showBooks(books);
    }

    async function searchBooks() {
        const keyword = document.getElementById("searchInput").value;

        const response = await fetch('/books/search?keyword=' + encodeURIComponent(keyword));
        const books = await response.json();

        showBooks(books);
    }

    async function addAuthor() {
    const name = document.getElementById("authorName").value;
    const countryName = document.getElementById("authorCountry").value;

    const response = await fetch("/authors", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            country: {
                name: countryName
            }
        })
    });

    if (response.ok) {
        alert("Автор доданий");
        location.reload();
    } else {
        alert("Помилка при додаванні автора");
    }
}

    async function addBook() {
        const title = document.getElementById("bookTitle").value;
        const year = parseInt(document.getElementById("bookYear").value);
        const authorIdsText = document.getElementById("bookAuthorIds").value;

        const authors = authorIdsText
            .split(",")
            .map(id => id.trim())
            .filter(id => id !== "")
            .map(id => ({ id: parseInt(id) }));

        const response = await fetch("/books", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title,
                year: year,
                authors: authors
            })
        });

        if (response.ok) {
            alert("Книга додана");
            location.reload();
        } else {
            alert("Помилка при додаванні книги");
        }
    }

    async function editBook(id, oldTitle, oldYear, oldAuthorIds) {
    const newTitle = prompt("Нова назва книги:", oldTitle);
    if (newTitle === null) return;

    const newYear = prompt("Новий рік:", oldYear);
    if (newYear === null) return;

    const newAuthorIds = prompt("ID авторів через кому:", oldAuthorIds);
    if (newAuthorIds === null) return;

    const authors = newAuthorIds
    .split(",")
    .map(id => id.trim())
    .filter(id => id !== "")
    .map(id => ({ id: parseInt(id) }));

    const response = await fetch(`/books/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: newTitle,
            year: parseInt(newYear),
            authors: authors
        })
    });

    if (response.ok) {
        alert("Книгу оновлено");
        loadBooks();
    } else {
        alert("Помилка редагування");
    }
}

    async function deleteBook(id) {
        if (!confirm("Видалити книгу?")) {
            return;
        }

        const response = await fetch(`/books/${id}`, {
            method: "DELETE"
        });

        if (response.ok) {
            alert("Книгу видалено");
            loadBooks();
        } else {
            alert("Помилка при видаленні книги");
        }
    }

    function showBooks(books) {
        const result = document.getElementById('result');
        result.innerHTML = '';

        if (!books || books.length === 0) {
            result.innerHTML = '<div class="empty">Книги не знайдено</div>';
            return;
        }

        books.forEach(book => {
            const authorsNames = book.authors
                ? book.authors.map(author => author.name).join(", ")
                : "Немає авторів";

            const countries = book.authors
    ? [...new Set(
        book.authors
            .map(author => author.country ? author.country.name : "")
            .filter(country => country !== "")
      )].join(", ")
    : "";

            result.innerHTML += `
    <div class="book">
        <span class="tag">${book.year}</span>
        <h3>${book.title}</h3>
        <p><b>Автори:</b> ${authorsNames}</p>
        <p><b>Країни:</b> ${countries}</p>

        <button class="edit-btn"
                onclick="editBook(${book.id}, '${book.title}', ${book.year}, '${book.authors ? book.authors.map(a => a.id).join(',') : ''}')">
            ✏️ Редагувати
        </button>

        <button class="delete-btn" onclick="deleteBook(${book.id})">
            🗑 Видалити
        </button>
    </div>
`;
        });
    }

    loadBooks();
</script>

</body>
</html>
