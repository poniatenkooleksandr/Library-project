<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Бібліотека Spring Data JPA</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }

        header {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            padding: 35px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
        }

        header p {
            margin-top: 10px;
            font-size: 18px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        .books {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .book {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            transition: 0.2s;
        }

        .book:hover {
            transform: translateY(-4px);
        }

        .book h3 {
            margin-top: 0;
            color: #1e40af;
        }

        .tag {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .empty {
            text-align: center;
            font-size: 18px;
            padding: 30px;
            color: #64748b;
        }
    </style>
</head>
<body>

<header>
    <h1>Бібліотека Spring Data JPA</h1>
    <p>Демонстрація роботи Spring з персистентними даними</p>
</header>

<div class="container">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Введіть назву книги">
        <button onclick="searchBooks()">Пошук</button>
        <button onclick="loadBooks()">Показати всі</button>
    </div>

    <h2> Додати автора</h2>

<div class="search-box">
    <input type="text" id="authorName" placeholder="Ім'я автора">
    <input type="text" id="authorCountry" placeholder="Країна">
    <button onclick="addAuthor()">Додати автора</button>
</div>

<h2> Додати книгу</h2>

<div class="search-box">
    <input type="text" id="bookTitle" placeholder="Назва книги">
    <input type="number" id="bookYear" placeholder="Рік">
    <input type="number" id="bookAuthorId" placeholder="ID автора">
    <button onclick="addBook()">Додати книгу</button>
</div>

    <div id="result" class="books"></div>

</div>

<script>
    async function deleteBook(id) {

    if (!confirm("Видалити книгу?")) {
        return;
    }

    const response = await fetch(`/books/${id}`, {
        method: "DELETE"
    });

    if (response.ok) {
        alert("Книгу видалено");
        loadBooks();
    }
}
    async function addAuthor() {
    const response = await fetch("/authors", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: document.getElementById("authorName").value,
            country: document.getElementById("authorCountry").value
        })
    });

    if (response.ok) {
        alert("Автор доданий");
        location.reload();
    }
}

async function addBook() {
    const response = await fetch("/books", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: document.getElementById("bookTitle").value,
            year: parseInt(document.getElementById("bookYear").value),
            author: {
                id: parseInt(document.getElementById("bookAuthorId").value)
            }
        })
    });

    if (response.ok) {
        alert("Книга додана");
        location.reload();
    }
}
    async function loadBooks() {
        const response = await fetch('/books');
        const books = await response.json();
        showBooks(books);
    }

    async function searchBooks() {
    const keyword = document.getElementById("searchInput").value;

    const response = await fetch('/books/search?keyword=' + encodeURIComponent(keyword));

    const books = await response.json();

    showBooks(books);
}

   function showBooks(books) {

    const result = document.getElementById('result');
    result.innerHTML = '';

    if (books.length === 0) {
        result.innerHTML = '<div class="empty">Книги не знайдено</div>';
        return;
    }

    books.forEach(book => {
        result.innerHTML += `
        <div class="book">
            <span class="tag">${book.year}</span>
            <h3>${book.title}</h3>
            <p><b>Автор:</b> ${book.author.name}</p>
            <p><b>Країна:</b> ${book.author.country}</p>

            <button onclick="deleteBook(${book.id})">
                🗑 Видалити
            </button>
        </div>
        `;
    });

}

    loadBooks();
</script>

</body>
</html>
